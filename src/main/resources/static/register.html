<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocVerify — Регистрация</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 24px; color: #1a1a2e; font-weight: 700; }
    .logo p { color: #888; font-size: 14px; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    input, select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }
    input:focus, select:focus { border-color: #4f46e5; }
    .btn {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:hover { background: #4338ca; }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    .error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .success {
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #166534;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .footer { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
    .footer a { color: #4f46e5; text-decoration: none; font-weight: 600; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>DocVerify</h1>
      <p>Создать аккаунт</p>
    </div>
    <div class="error" id="error"></div>
    <div class="success" id="success"></div>
    <div class="form-group">
      <label>Имя</label>
      <input type="text" id="name" placeholder="Ваше имя">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" id="password" placeholder="Минимум 6 символов">
    </div>
    <div class="form-group">
      <label>Роль</label>
      <select id="role">
        <option value="AUTHOR">Автор</option>
        <option value="CONTROLLER">Контролёр</option>
        <option value="ADMIN">Администратор</option>
      </select>
    </div>
    <button class="btn" id="regBtn" onclick="register()">Зарегистрироваться</button>
    <div class="footer">
      Уже есть аккаунт? <a href="/">Войти</a>
    </div>
  </div>

  <script>
    async function register() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      const errorEl = document.getElementById('error');
      const successEl = document.getElementById('success');
      const btn = document.getElementById('regBtn');

      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      if (!name || !email || !password) {
        errorEl.textContent = 'Заполните все поля';
        errorEl.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        errorEl.textContent = 'Пароль минимум 6 символов';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Регистрация...';

      try {
        const res = await fetch('/api/v1/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role })
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error || 'Ошибка регистрации';
          errorEl.style.display = 'block';
          return;
        }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify({ id: data.id, email: data.email, name: data.name, role: data.role }));
        successEl.textContent = 'Аккаунт создан! Перенаправление...';
        successEl.style.display = 'block';
        setTimeout(() => window.location.href = '/dashboard.html', 1000);
      } catch (e) {
        errorEl.textContent = 'Ошибка соединения с сервером';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Зарегистрироваться';
      }
    }
  </script>
</body>
</html>
